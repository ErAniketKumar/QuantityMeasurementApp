<div class="container">

  <h2>Compare Quantities</h2>

  <form>

    <label>Measurement Type</label>

    <select>
      <option>Length</option>
      <option>Weight</option>
      <option>Temperature</option>
      <option>Volume</option>
    </select>

    <label>Value 1</label>
    <input type="number">

    <label>Unit 1</label>
    <select>
      <option>Meter</option>
      <option>Kilometer</option>
      <option>Centimeter</option>
    </select>

    <label>Value 2</label>
    <input type="number">

    <label>Unit 2</label>
    <select>
      <option>Meter</option>
      <option>Kilometer</option>
      <option>Centimeter</option>
    </select>

    <button type="submit">
      Compare
    </button>

  </form>

</div>
