<div class="container">
  <h2>Subtract Quantities</h2>
  <form [formGroup]="operationForm" (ngSubmit)="handleSub()">
    <label>Measurement Type</label>
    <select formControlName="measurementType" (change)="onMeasurementTypeChange()">
      <option value="">Select Type</option>
      <option *ngFor="let type of unitMapService.MEASUREMENT_TYPES" [value]="type">{{ type }}</option>
    </select>

    <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
      <div style="flex: 1;">
        <label>Value 1 (From)</label>
        <input type="number" formControlName="val1" />
      </div>
      <div style="flex: 1;">
        <label>Unit 1</label>
        <select formControlName="unit1">
          <option value="">Select Unit</option>
          <option *ngFor="let unit of availableUnits" [value]="unit">{{ unit }}</option>
        </select>
      </div>
    </div>

    <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
      <div style="flex: 1;">
        <label>Value 2 (Subtract)</label>
        <input type="number" formControlName="val2" />
      </div>
      <div style="flex: 1;">
        <label>Unit 2</label>
        <select formControlName="unit2">
          <option value="">Select Unit</option>
          <option *ngFor="let unit of availableUnits" [value]="unit">{{ unit }}</option>
        </select>
      </div>
    </div>

    <button type="submit" [disabled]="operationForm.invalid">Subtract Quantities</button>
  </form>

  <div *ngIf="resultText" class="result-card fade-in">
    <h3>Result</h3>
    <p>{{ resultText }}</p>
  </div>
</div>
