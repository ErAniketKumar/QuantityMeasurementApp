<div class="dashboard">
  <h1>Quantity Measurement Dashboard</h1>

  <div class="cards">
    <div class="card">
      <h2>Compare</h2>
      <p>Compare two quantities.</p>
      <button>
        <a routerLink="/compare"> Open</a>
      </button>
    </div>

    <div class="card">
      <h2>Convert</h2>
      <p>Convert between units.</p>
      <button>
        <a routerLink="/convert"> Open</a>
      </button>
    </div>

    <div class="card">
      <h2>Add</h2>
      <p>Add two quantities.</p>
      <button>
        <a routerLink="/operations/add"> Open</a>
      </button>
    </div>

    <div class="card">
      <h2>Subtract</h2>
      <p>Subtract quantities.</p>
      <button>
        <a routerLink="/operations/sub"> Open</a>
      </button>
    </div>

    <div class="card">
      <h2>Divide</h2>
      <p>Divide quantities.</p>
      <button>
        <a routerLink="/operations/div"> Open</a>
      </button>
    </div>

    <div class="card">
      <h2>History</h2>
      <p>View operation history.</p>
      <button>
        <a routerLink="/history"> Open</a>
      </button>
    </div>
  </div>
</div>
